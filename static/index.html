<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleo</title>
<link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6eff;
    --accent2: #ff6e9b;
    --accent3: #6effc8;
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --user-bubble: #1e1b38;
    --ai-bubble: #111118;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --error: #ff4d4f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,110,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(255,110,155,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 60% 40%, rgba(110,255,200,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10, 10, 15, 0.8);
    backdrop-filter: blur(20px);
  }

  .logo { display: flex; align-items: center; gap: 12px; }
   .logo-icon {
     width: 36px; height: 36px;
     display: flex; align-items: center; justify-content: center;
     flex-shrink: 0;
   }
   .logo-icon img {
     width: 100%; height: 100%;
     object-fit: contain;
   }
  .logo-text { font-family: var(--mono); font-size: 14px; font-weight: 700; letter-spacing: 0.05em; }
  .logo-sub { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.1em; }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent3); box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .header-actions { display: flex; align-items: center; gap: 12px; }
  .btn-clear {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.05em;
    color: var(--text-muted); background: none;
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; cursor: pointer; transition: all 0.2s;
  }
  .btn-clear:hover { color: var(--accent2); border-color: var(--accent2); }

  .layout { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

  .sidebar {
    width: 220px; border-right: 1px solid var(--border);
    padding: 20px 16px; display: flex; flex-direction: column;
    gap: 8px; overflow-y: auto;
    background: rgba(17, 17, 24, 0.6);
  }
  .sidebar-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 4px; padding: 0 4px;
  }
  .tool-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: 8px; border: 1px solid transparent;
    cursor: default; font-size: 12px; color: var(--text-muted);
    transition: all 0.15s;
  }
  .tool-chip:hover { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .tool-chip .icon { font-size: 14px; }

  .suggestion-btn {
    width: 100%; text-align: left; padding: 9px 10px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text-muted);
    font-size: 11px; font-family: var(--sans);
    cursor: pointer; transition: all 0.15s; line-height: 1.4;
  }
  .suggestion-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent); }

  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome { text-align: center; padding: 60px 20px; animation: fadeUp 0.5s ease; }
  .welcome-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .welcome h2 { font-family: var(--mono); font-size: 20px; color: var(--text); margin-bottom: 8px; }
  .welcome p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

  .msg { display: flex; gap: 12px; animation: fadeUp 0.3s ease; max-width: 800px; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .avatar {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; margin-top: 2px;
  }
  .msg.user .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
  .msg.assistant .avatar { background: var(--surface2); border: 1px solid var(--border); }

  .bubble {
    padding: 12px 16px; border-radius: 12px;
    font-size: 14px; line-height: 1.65; max-width: 600px; word-break: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bubble);
    border: 1px solid rgba(124,110,255,0.25);
    border-top-right-radius: 4px; color: var(--text);
  }
  .msg.assistant .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
  }

  .bubble strong { color: var(--accent3); font-weight: 600; }
  .bubble em { color: var(--text-muted); font-style: italic; }
  .bubble code {
    font-family: var(--mono); font-size: 12px;
    background: rgba(255,255,255,0.06); padding: 2px 6px;
    border-radius: 4px; color: var(--accent);
  }
  .bubble pre { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; }
  .bubble pre code { background: none; padding: 0; }
  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin-bottom: 3px; }

  .typing { display: flex; gap: 4px; padding: 14px 16px; align-items: center; }
  .dot { width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: rgba(10, 10, 15, 0.8);
    backdrop-filter: blur(20px);
  }
  .input-wrapper {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color 0.2s;
  }
  .input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,110,255,0.1); }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--sans); font-size: 14px;
    line-height: 1.5; resize: none; max-height: 120px; min-height: 24px;
  }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    width: 36px; height: 36px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  #send-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: scale(1); }

  .input-hint { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 8px; letter-spacing: 0.04em; }
  .error-bubble {
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    min-width: 220px;
    max-width: 480px;
    box-shadow: 0 2px 12px 0 rgba(124,110,255,0.07);
  }

  .error-bubble .error-text {
    flex: 1;
    color: var(--accent);
    word-break: break-word;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .error-bubble .retry-btn {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 20px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    transition: background 0.2s;
    position: absolute;
    right: -50px
  }
  .error-bubble .retry-btn .tooltip {
    visibility: hidden;
    opacity: 0;
    background: var(--surface);
    color: var(--text);
    text-align: center;
    border-radius: 6px;
    padding: 4px 10px;
    position: absolute;
    z-index: 10;
    right: 110%;
    top: 50%;
    transform: translateY(-50%);
    font-size: 12px;
    font-family: var(--sans);
    box-shadow: 0 2px 8px 0 rgba(0,0,0,0.10);
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .error-bubble .retry-btn:hover .tooltip {
    visibility: visible;
    opacity: 1;
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><img src="/static/logo.svg" alt="Cleo Logo"></div>
    <div>
      <div class="logo-text">CLEO</div>
      <div class="logo-sub">MCP · GEMINI · PYTHON</div>
    </div>
  </div>
  <div class="header-actions">
    <div class="status-dot"></div>
    <button class="btn-clear" onclick="clearChat()">NEW CHAT</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">MCP Tools</div>
    <div class="tool-chip"><span class="icon">📁</span>File System</div>
    <div class="tool-chip"><span class="icon">🔍</span>Web Search</div>
    <div class="tool-chip"><span class="icon">🗄️</span>SQL Database</div>
    <div class="tool-chip"><span class="icon">🌐</span>External APIs</div>

    <div class="sidebar-label" style="margin-top: 16px;">Suggestions</div>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📅 What time is it in Rome?</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🌤️ Weather in Milan today</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📝 Create a note "To Do"</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">✅ Add task: buy groceries</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📋 Show all notes</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">🔍 Search: artificial intelligence</button>
    <button class="suggestion-btn" onclick="sendSuggestion(this)">📂 List available files</button>
  </aside>

  <div class="chat-area">
    <div id="messages">
      <div class="welcome" id="welcome">
        <span class="welcome-icon">✦</span>
        <h2>Hi, I'm Cleo</h2>
        <p>I can help you with files, web searches,<br>database and real-time information.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Write a message..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button id="send-btn" onclick="sendMessage()">↑</button>
      </div>
      <div class="input-hint">Send to confirm · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
  const SESSION_ID = 'session_' + Date.now();
  let isLoading = false;
    let lastMessage = null;  // Store the last message for retry

    function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function sendSuggestion(btn) {
    const text = btn.textContent.replace(/^[^\s]+\s/, '');
    document.getElementById('user-input').value = text;
    sendMessage();
    }

    function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
    }

    async function retryLastMessage() {
    if (!lastMessage || isLoading) return;
    appendMessage('user', lastMessage);
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: lastMessage, session_id: SESSION_ID })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('assistant', `⚠️ Error: ${data.error}`, true);
      } else {
        appendMessage('assistant', data.response);
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', `⚠️ Connection error: ${err.message}`, true);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('user-input').focus();
    }
    }

    function appendMessage(role, content, isError = false) {
    removeWelcome();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '👤' : '✦';
    let bubbleContent;
    if (isError) {
      // Error bubble with modern Material Design refresh icon
      const refreshIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.13-3.36L23 10"/><path d="M20.49 15A9 9 0 0 1 5.87 18.36L1 14"/></svg>`;
      bubbleContent = `<div class=\"error-bubble\"><span class=\"error-text\">${content}</span><button class=\"retry-btn\" onclick=\"retryLastMessage()\" aria-label=\"Retry\">${refreshIcon}<span class=\"tooltip\">Retry</span></button></div>`;
      div.innerHTML = `<div class=\"avatar\">${avatar}</div>${bubbleContent}`;
      container.appendChild(div);
    } else {
      bubbleContent = `<div class=\"bubble\">${formatText(content)}</div>`;
      div.innerHTML = `<div class=\"avatar\">${avatar}</div>${bubbleContent}`;
      container.appendChild(div);
    }

    container.scrollTop = container.scrollHeight;
    }

  function showTyping() {
    removeWelcome();
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="avatar">✦</div><div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function formatText(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*]+)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message || isLoading) return;
    input.value = '';
    input.style.height = 'auto';
    appendMessage('user', message);
    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();
    lastMessage = message;  // Save the last sent message
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, session_id: SESSION_ID })
      });
      const data = await res.json();
      removeTyping();
      if (data.error) {
        appendMessage('assistant', `⚠️ Error: ${data.error}`, true);
      } else {
        appendMessage('assistant', data.response);
      }
    } catch (err) {
      removeTyping();
      appendMessage('assistant', `⚠️ Connection error: ${err.message}`, true);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    }
  }

  async function clearChat() {
    await fetch('/api/clear', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: SESSION_ID })
    });
    document.getElementById('messages').innerHTML = `
      <div class="welcome" id="welcome">
        <span class="welcome-icon">✦</span>
        <h2>Hi, I'm Cleo</h2>
        <p>I can help you with files, web searches,<br>database and real-time information.</p>
      </div>`;
  }

  document.getElementById('user-input').focus();
</script>
</body>
</html>
